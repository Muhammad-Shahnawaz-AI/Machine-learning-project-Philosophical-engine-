<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Philosophical Engine - Web GUI</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        .control-group {
            display: flex;
            flex-direction: column;
        }
        
        label {
            font-weight: bold;
            margin-bottom: 5px;
            color: #555;
        }
        
        select, input, button {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .visualization {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .chart-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .chart-container h3 {
            margin-bottom: 15px;
            color: #333;
            text-align: center;
        }
        
        .status {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        .verdict {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            font-style: italic;
            font-size: 1.1em;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .visualization {
                grid-template-columns: 1fr;
            }
            .controls {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Philosophical Engine</h1>
        
        <div id="status" class="status info">
            Welcome to the Philosophical Engine Web Interface
        </div>
        
        <div class="controls">
            <div class="control-group">
                <label for="mode">Mode of Inquiry:</label>
                <select id="mode">
                    <option value="">Loading modes...</option>
                </select>
            </div>
            
            <div class="control-group">
                <label for="datasetType">Dataset Type:</label>
                <select id="datasetType">
                    <option value="classification">Classification</option>
                    <option value="regression">Regression</option>
                </select>
            </div>
            
            <div class="control-group">
                <label for="epochs">Epochs:</label>
                <input type="number" id="epochs" value="120" min="10" max="500">
            </div>
            
            <div class="control-group">
                <label for="learningRate">Learning Rate:</label>
                <input type="number" id="learningRate" value="0.05" min="0.001" max="1" step="0.001">
            </div>
        </div>
        
        <div style="text-align: center; margin-bottom: 20px;">
            <button id="generateData">Generate Data</button>
            <button id="train">Train Model</button>
            <button id="startScraper">Start Scraper</button>
            <button id="stopScraper">Stop Scraper</button>
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div>Processing...</div>
        </div>
        
        <div class="visualization">
            <div class="chart-container">
                <h3>Decision Boundary</h3>
                <canvas id="boundaryChart"></canvas>
            </div>
            
            <div class="chart-container">
                <h3>Training Metrics</h3>
                <canvas id="metricsChart"></canvas>
            </div>
        </div>
        
        <div id="verdict" class="verdict" style="display: none;">
            <!-- Philosophical verdict will appear here -->
        </div>
    </div>

    <script>
        let boundaryChart = null;
        let metricsChart = null;
        
        // Initialize charts
        function initCharts() {
            const boundaryCtx = document.getElementById('boundaryChart').getContext('2d');
            const metricsCtx = document.getElementById('metricsChart').getContext('2d');
            
            boundaryChart = new Chart(boundaryCtx, {
                type: 'scatter',
                data: {
                    datasets: []
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { title: { display: true, text: 'Feature 1' } },
                        y: { title: { display: true, text: 'Feature 2' } }
                    }
                }
            });
            
            metricsChart = new Chart(metricsCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Loss',
                        data: [],
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        tension: 0.1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { title: { display: true, text: 'Epoch' } },
                        y: { title: { display: true, text: 'Loss' } }
                    }
                }
            });
        }
        
        // Show status message
        function showStatus(message, type = 'info') {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status ${type}`;
        }
        
        // Show/hide loading
        function setLoading(loading) {
            document.getElementById('loading').style.display = loading ? 'block' : 'none';
        }
        
        // Load available modes
        async function loadModes() {
            try {
                const response = await fetch('/modes');
                const data = await response.json();
                const select = document.getElementById('mode');
                select.innerHTML = '';
                data.modes.forEach(mode => {
                    const option = document.createElement('option');
                    option.value = mode;
                    option.textContent = mode;
                    select.appendChild(option);
                });
                showStatus('Modes loaded successfully', 'success');
            } catch (error) {
                showStatus('Failed to load modes: ' + error.message, 'error');
            }
        }
        
        // Generate data
        async function generateData() {
            setLoading(true);
            try {
                // This would need to be implemented in the backend
                showStatus('Data generation simulated', 'success');
                // Generate some dummy data for visualization
                const scatterData = [];
                for (let i = 0; i < 100; i++) {
                    scatterData.push({
                        x: Math.random() * 8 - 4,
                        y: Math.random() * 8 - 4
                    });
                }
                
                boundaryChart.data.datasets = [{
                    label: 'Generated Data',
                    data: scatterData,
                    backgroundColor: 'rgba(102, 126, 234, 0.6)'
                }];
                boundaryChart.update();
                
            } catch (error) {
                showStatus('Failed to generate data: ' + error.message, 'error');
            } finally {
                setLoading(false);
            }
        }
        
        // Train model
        async function trainModel() {
            setLoading(true);
            try {
                const response = await fetch('/train', { method: 'POST' });
                const data = await response.json();
                showStatus(data.message, 'success');
                
                // Simulate training metrics
                const epochs = parseInt(document.getElementById('epochs').value);
                const lossData = [];
                for (let i = 0; i <= epochs; i++) {
                    lossData.push(Math.exp(-i * 0.05) + Math.random() * 0.1);
                }
                
                metricsChart.data.labels = Array.from({length: epochs + 1}, (_, i) => i);
                metricsChart.data.datasets[0].data = lossData;
                metricsChart.update();
                
                // Show philosophical verdict
                const verdicts = {
                    'Relativism': 'Each decision is shaped by its nearest neighbors, reminding us that perspective defines truth.',
                    'Socratic Method': 'A tree of questions grows until the simplest answer reveals the structure of reason.',
                    'Epistemological Doubt': 'Every probability curve is a meditation on evidence and uncertainty.',
                    'Teleology': 'A line drawn toward purpose shows how past data bends toward future meaning.',
                    'Taxonomy of Being': 'Clusters emerge as categories of existence; similarity becomes the taxonomy of the soul.',
                    'Collective Consciousness': 'A forest of minds votes together, demonstrating how strength arises from plural understanding.',
                    'Hegelian Dialectics': 'Residuals are synthesized through thesis and antithesis until a higher truth emerges.',
                    'The Neural Nexus': 'A layered network learns hidden patterns, echoing a neural architecture of thought.'
                };
                
                const mode = document.getElementById('mode').value;
                const verdict = document.getElementById('verdict');
                verdict.textContent = verdicts[mode] || 'The engine searches for meaning through algorithmic reflection.';
                verdict.style.display = 'block';
                
            } catch (error) {
                showStatus('Training failed: ' + error.message, 'error');
            } finally {
                setLoading(false);
            }
        }
        
        // Start scraper
        async function startScraper() {
            setLoading(true);
            try {
                const response = await fetch('/start_scraper', { method: 'POST' });
                const data = await response.json();
                showStatus(data.message, 'success');
            } catch (error) {
                showStatus('Failed to start scraper: ' + error.message, 'error');
            } finally {
                setLoading(false);
            }
        }
        
        // Stop scraper
        async function stopScraper() {
            setLoading(true);
            try {
                const response = await fetch('/stop_scraper', { method: 'POST' });
                const data = await response.json();
                showStatus(data.message, 'success');
            } catch (error) {
                showStatus('Failed to stop scraper: ' + error.message, 'error');
            } finally {
                setLoading(false);
            }
        }
        
        // Event listeners
        document.getElementById('generateData').addEventListener('click', generateData);
        document.getElementById('train').addEventListener('click', trainModel);
        document.getElementById('startScraper').addEventListener('click', startScraper);
        document.getElementById('stopScraper').addEventListener('click', stopScraper);
        
        // Initialize on load
        window.addEventListener('load', () => {
            initCharts();
            loadModes();
        });
    </script>
</body>
</html>
